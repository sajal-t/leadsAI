# Railway deploy — uses Dockerfile (includes google-maps-scraper + Playwright).
# Docs: https://docs.railway.com/guides/dockerfiles

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
